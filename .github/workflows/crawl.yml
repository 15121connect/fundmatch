name: Weekly fund crawl

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to push updated funds.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawl
        run: python -m crawler.run_crawl

      - name: Commit updated fund data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/funds.json
          git diff --cached --quiet || git commit -m "chore: update fund data [$(date -u +%Y-%m-%d)]"
          git push
